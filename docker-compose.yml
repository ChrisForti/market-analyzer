services:
  postgres:
    image: postgres:15-alpine
    container_name: jimmy-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=jimmy
      - POSTGRES_USER=jimmy
      - POSTGRES_PASSWORD=jimmy_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jimmy"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: jimmy-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres

  agent:
    build: ./agent
    container_name: jimmy-agent
    ports:
      - "3141:3141"
    environment:
      - DATABASE_URL=postgresql://jimmy:jimmy_dev_password@postgres:5432/jimmy
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER}
      - RUN_ANALYSIS_ON_STARTUP=false
    volumes:
      - ./prompts:/app/prompts:ro
      - agent_sessions:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  agent_sessions: